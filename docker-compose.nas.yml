# THIS IS THE AUTHORITATIVE PRODUCTION CONFIG — deployed via Portainer on the
# Synology NAS. docker-compose.yml (repo root) is for local development only;
# it is not deployed anywhere. See docs/DECISIONS.md for why these are two
# separate files rather than one with overrides.
#
# TLS is terminated by Cloudflare Tunnel (see the cloudflared service below),
# not by a DSM reverse proxy or local nginx — nginx/nginx.conf in this repo is
# unused/orphaned.
#
# Deploy: Portainer → Stack → paste this file → fill in env vars → Deploy.
# Redeploy after a push: Portainer → Stack → Pull and Redeploy.

version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: streetfeed
      POSTGRES_USER: ${POSTGRES_USER:-streetfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streetfeed}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/wendyfred6/streetfeed-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-streetfeed}:${POSTGRES_PASSWORD:-}@db:5432/streetfeed
      APP_URL: ${APP_URL:-https://streetfeed.nl}
      FRONTEND_URL: ${APP_URL:-https://streetfeed.nl}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-Streetfeed <noreply@streetfeed.nl>}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@streetfeed.nl}
      UPLOAD_DIR: /data/photos
    volumes:
      - photos:/data/photos

  frontend:
    image: ghcr.io/wendyfred6/streetfeed-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"          # Synology reverse proxy wijst hiernaartoe
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  pgdata:
  photos:
