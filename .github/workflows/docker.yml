name: Build & push Docker images

# Milestone-branch workflow (from M4 onward): feature/** branches get full
# lint/test CI so issues can be verified against a real CI run same as on
# main, but only main builds and publishes :latest — that image is what
# docker-compose.nas.yml pins in production, so it must only ever move on a
# milestone merge to main, never mid-milestone. See docs/DECISIONS.md.
on:
  push:
    branches: [main, 'feature/**']

env:
  REGISTRY: ghcr.io
  OWNER: wendyfred6

jobs:
  test-backend:
    runs-on: ubuntu-latest
    # Postgres for the FRE-309 registration→approval→login smoke test — the
    # rest of the backend tests are pure unit tests and don't touch this.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: streetfeed
          POSTGRES_PASSWORD: streetfeed
          POSTGRES_DB: streetfeed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U streetfeed"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # Older npm CLIs (seen: 11.8.0) mishandle optional platform-specific
      # dependencies in package-lock.json (e.g. esbuild's @esbuild/* binaries),
      # causing `npm ci` to hard-fail with EBADPLATFORM instead of skipping
      # them. Pin a version confirmed to install cleanly.
      - run: npm install -g npm@11.18.0
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://streetfeed:streetfeed@localhost:5432/streetfeed

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # See the comment in test-backend above — same npm CLI lockfile bug.
      - run: npm install -g npm@11.18.0
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  build-backend:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/wendyfred6/streetfeed-backend:latest
            ghcr.io/wendyfred6/streetfeed-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/wendyfred6/streetfeed-frontend:latest
            ghcr.io/wendyfred6/streetfeed-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
