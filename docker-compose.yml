version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: streetfeed
      POSTGRES_USER: streetfeed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetfeed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/wendyfred6/streetfeed-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      APP_URL: https://streetfeed.nl
      FRONTEND_URL: https://streetfeed.nl
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "Streetfeed <noreply@streetfeed.nl>"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: admin@streetfeed.nl
      UPLOAD_DIR: /data/photos
    volumes:
      - photos:/data/photos

  frontend:
    image: ghcr.io/wendyfred6/streetfeed-frontend:latest
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  pgdata2:
  photos:
