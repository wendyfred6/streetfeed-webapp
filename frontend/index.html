<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- "default"/"black" reserve the status bar as its own opaque, OS-drawn
       strip — no fixed element's background can ever paint behind it there,
       regardless of viewport-fit=cover or env(safe-area-inset-top) math.
       "black-translucent" is what actually lets the standalone PWA's own
       background extend under the status bar/Dynamic Island (2026-07-20,
       root cause of the header still showing a gap there). -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Streetfeed" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Streetfeed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FFFFFF; font-family: 'Inter', 'Helvetica Neue', sans-serif; color: #1C1A18; }
    body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(160deg, #FFF7E3 0%, #FFC4C5 45%, #FFFDE7 73%, #FFE1F1 100%); opacity: 0.4; z-index: -1; }
    input, textarea, select, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
